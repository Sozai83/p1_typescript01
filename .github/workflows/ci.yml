name: CI

on:
  push:
    paths:
      - 'typescript_06_express/**'
    branches:
      - main

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    defaults: 
      run:
        working-directory: typescript_06_express    # ← all run: commands here use  this folder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "./typescript_06_express/.nvmrc"
          cache: "npm"
          cache-dependency-path: "./typescript_06_express/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Run TypeScript type checking
        run: npm run type-check

      - name: Run ESLint and fix
        run: npm run lint:fix

      - name: Format with Prettier
        run: npm run format

      - name: Check for remaining ESLint errors
        run: npm run lint

      - name: Check for remaining formatting issues
        run: npm run format:check